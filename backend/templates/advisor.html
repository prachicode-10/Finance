<header style="margin-bottom: 2.5rem;">
    <h1 style="font-size: 2rem; margin-bottom: 0.5rem;">AI Financial Advisor</h1>
    <p style="color: var(--text-muted);">Get personalized investment insights using 24/7 intelligence.</p>
</header>

<div class="glass-card" style="height: 60vh; display: flex; flex-direction: column;">
    <div id="chat-messages"
        style="flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 1rem;">
        <div
            style="align-self: flex-start; background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 12px; max-width: 80%;">
            Hello! I'm your AI Advisor. How can I help you with your investments today?
        </div>
    </div>

    <div style="padding: 1.5rem; border-top: 1px solid var(--card-border);">
        <form id="chat-form" onsubmit="sendMessage(event)" style="display: flex; gap: 1rem;">
            <input type="text" id="chat-input" placeholder="Ask me about your portfolio or market trends..."
                style="flex: 1; background: rgba(255,255,255,0.02); border: 1px solid var(--card-border); padding: 0.8rem 1.2rem; border-radius: 8px; color: white;">
            <button type="submit" class="btn-primary">
                <i data-lucide="send"></i>
            </button>
        </form>
    </div>
</div>

<script>
    function sendMessage(event) {
        event.preventDefault();
        const input = document.getElementById('chat-input');
        const msg = input.value;
        if (!msg) return;

        const container = document.getElementById('chat-messages');

        // Add User Message
        const userDiv = document.createElement('div');
        userDiv.style.cssText = 'align-self: flex-end; background: var(--secondary); padding: 1rem; border-radius: 12px; max-width: 80%;';
        userDiv.innerText = msg;
        container.appendChild(userDiv);

        input.value = '';

        // Add Bot Response (Simulated)
        setTimeout(() => {
            const botDiv = document.createElement('div');
            botDiv.style.cssText = 'align-self: flex-start; background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 12px; max-width: 80%;';
            botDiv.innerText = "That's an interesting question about " + msg.split(' ')[0] + ". Based on my analysis, you should look at the current market volatility and diversify your portfolio accordingly.";
            container.appendChild(botDiv);
            container.scrollTop = container.scrollHeight;
        }, 1000);
    }
</script>
