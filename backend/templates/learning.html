<div id="learning-root" style="max-width: 1000px; margin: 0 auto;">
    <!-- Course List View -->
    <div id="view-courses">
        <header style="margin-bottom: 2.5rem;">
            <h1 style="font-size: 2rem; margin-bottom: 0.5rem;">Finance Academy</h1>
            <p style="color: var(--text-muted);">Master the markets with our structured learning paths.</p>
        </header>

        <div id="courses-grid"
            style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem;">
            <!-- Rendered by JS -->
        </div>
    </div>

    <!-- Course Details View -->
    <div id="view-details" style="display: none;">
        <button class="nav-item" onclick="switchTo('courses')"
            style="display: flex; align-items: center; gap: 8px; margin-bottom: 2rem; background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 0;">
            <i data-lucide="arrow-left"></i> Back to Academy
        </button>
        <div class="glass-card" style="padding: 2.5rem;">
            <h2 id="course-title" style="margin-bottom: 1rem;"></h2>
            <p id="course-desc" style="color: var(--text-muted); margin-bottom: 2.5rem;"></p>

            <div id="modules-list" style="display: grid; gap: 1.5rem;">
                <!-- Rendered by JS -->
            </div>

            <div id="quiz-btn-container" style="margin-top: 3rem; text-align: center;">
                <button class="btn-primary" onclick="startQuiz()" style="padding: 1rem 2.5rem;">
                    Take the Assessment
                </button>
            </div>
        </div>
    </div>

    <!-- Quiz View -->
    <div id="view-quiz" style="display: none;">
        <button class="nav-item" onclick="switchTo('details')"
            style="display: flex; align-items: center; gap: 8px; margin-bottom: 2rem; background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 0;">
            <i data-lucide="arrow-left"></i> Exit Quiz
        </button>
        <div id="quiz-card" class="glass-card" style="padding: 2.5rem;">
            <div id="quiz-question-container">
                <div style="margin-bottom: 2.5rem;">
                    <span id="quiz-course-tag" class="badge-ai"
                        style="background: rgba(99, 102, 241, 0.1); color: var(--primary); padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600;"></span>
                    <h3 id="question-text"
                        style="font-size: 1.4rem; margin-top: 1rem; display: flex; gap: 12px; margin-top: 1rem;">
                        <i data-lucide="help-circle" style="color: var(--secondary)"></i>
                        <span></span>
                    </h3>
                </div>

                <div id="options-grid" style="display: grid; gap: 1rem;">
                    <!-- Rendered by JS -->
                </div>

                <div id="quiz-feedback"
                    style="display: none; margin-top: 2rem; padding: 1.5rem; background: rgba(255,255,255,0.02); border-radius: 12px; border-left: 4px solid var(--secondary);">
                    <h4 style="color: var(--secondary); margin-bottom: 0.5rem;">AI Insight</h4>
                    <p id="explanation-text" style="font-size: 0.95rem; color: var(--text-muted);"></p>
                </div>

                <div style="margin-top: 2.5rem; display: flex; justify-content: space-between; align-items: center;">
                    <p id="question-counter" style="color: var(--text-muted); font-size: 0.9rem;"></p>
                    <button id="quiz-primary-btn" class="btn-primary" onclick="handleQuizAction()">Check Answer</button>
                </div>
            </div>

            <!-- Quiz Results -->
            <div id="quiz-results" style="display: none; text-align: center; padding: 1rem;">
                <i data-lucide="check-circle-2"
                    style="width: 60px; height: 60px; color: var(--primary); margin-bottom: 1.5rem;"></i>
                <h2>Assessment Complete!</h2>
                <p id="final-score" style="margin: 1rem 0; font-size: 1.2rem;"></p>
                <div style="display: flex; gap: 1rem; justify-content: center; margin-top: 2rem;">
                    <button class="btn-outline" onclick="startQuiz()"
                        style="display: flex; align-items: center; gap: 8px;">
                        <i data-lucide="rotate-ccw"></i> Retake Quiz
                    </button>
                    <button class="btn-primary" onclick="switchTo('details')">Return to Course</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let currentCourse = null;
    let currentQuestionIdx = 0;
    let selectedOptionIdx = null;
    let isSubmitted = false;
    let score = 0;

    function renderCourses() {
        const grid = document.getElementById('courses-grid');
        grid.innerHTML = COURSES_DATA.map(course => `
            <div class="glass-card course-card" style="padding: 2rem;">
                <div class="icon-box" style="margin-bottom: 1.5rem; background: rgba(99, 102, 241, 0.1); color: var(--secondary); width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                    <i data-lucide="${course.icon}"></i>
                </div>
                <h3>${course.title}</h3>
                <p style="color: var(--text-muted); margin: 1rem 0 2rem; font-size: 0.95rem;">${course.description}</p>
                <button class="btn-primary" style="width: 100%;" onclick="viewCourseDetails('${course.id}')">
                    Start Learning
                </button>
            </div>
        `).join('');
        lucide.createIcons();
    }

    function viewCourseDetails(id) {
        currentCourse = COURSES_DATA.find(c => c.id === id);
        document.getElementById('course-title').innerText = currentCourse.title;
        document.getElementById('course-desc').innerText = currentCourse.description;

        const modulesList = document.getElementById('modules-list');
        modulesList.innerHTML = currentCourse.modules.map((m, i) => `
            <div class="module-item" style="padding: 1.5rem; background: rgba(255,255,255,0.02); border-radius: 16px; border: 1px solid var(--card-border);">
                <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 1rem;">
                    <div style="width: 28px; height: 28px; border-radius: 50%; background: var(--primary); color: black; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.8rem;">
                        ${i + 1}
                    </div>
                    <h4 style="margin: 0;">${m.title}</h4>
                </div>
                <p style="font-size: 0.95rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 1.5rem;">${m.content}</p>
                
                ${m.videoUrl ? `
                    <div class="video-section" style="border-radius: 12px; overflow: hidden; border: 1px solid var(--card-border);">
                        <div style="display: flex; align-items: center; gap: 8px; padding: 10px 15px; background: rgba(255,255,255,0.03); border-bottom: 1px solid var(--card-border);">
                            <i data-lucide="video" style="width: 16px; height: 16px; color: var(--primary);"></i>
                            <span style="font-size: 0.85rem; font-weight: 600;">Video Explanation</span>
                        </div>
                        <div style="position: relative; padding-bottom: 56.25%; height: 0;">
                            <iframe 
                                src="${m.videoUrl}?origin=${window.location.origin}" 
                                style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;"
                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                                allowfullscreen></iframe>
                        </div>
                    </div>
                ` : ''}
            </div>
        `).join('');

        switchTo('details');
        lucide.createIcons();
    }

    function startQuiz() {
        currentQuestionIdx = 0;
        selectedOptionIdx = null;
        isSubmitted = false;
        score = 0;

        document.getElementById('quiz-results').style.display = 'none';
        document.getElementById('quiz-question-container').style.display = 'block';

        document.getElementById('quiz-course-tag').innerText = currentCourse.title;
        renderQuestion();
        switchTo('quiz');
    }

    function renderQuestion() {
        const quizData = QUIZ_DATA.filter(q => currentCourse.quizIds.includes(q.id));
        const q = quizData[currentQuestionIdx];

        document.getElementById('question-text').querySelector('span').innerText = q.question;
        document.getElementById('question-counter').innerText = `Question ${currentQuestionIdx + 1} of ${quizData.length}`;

        const optionsGrid = document.getElementById('options-grid');
        optionsGrid.innerHTML = q.options.map((opt, i) => `
            <div class="quiz-option" id="opt-${i}" onclick="selectOption(${i})" 
                style="padding: 1.2rem; border-radius: 12px; background: rgba(255,255,255,0.03); border: 1px solid var(--card-border); cursor: pointer; transition: all 0.2s ease; display: flex; justify-content: space-between; align-items: center;">
                ${opt}
                <div class="status-icon"></div>
            </div>
        `).join('');

        document.getElementById('quiz-feedback').style.display = 'none';
        document.getElementById('quiz-primary-btn').innerText = 'Check Answer';
        selectedOptionIdx = null;
        isSubmitted = false;
        lucide.createIcons();
    }

    function selectOption(idx) {
        if (isSubmitted) return;

        const options = document.querySelectorAll('.quiz-option');
        options.forEach(o => o.style.borderColor = 'var(--card-border)');

        selectedOptionIdx = idx;
        document.getElementById(`opt-${idx}`).style.borderColor = 'var(--secondary)';
    }

    function handleQuizAction() {
        const quizData = QUIZ_DATA.filter(q => currentCourse.quizIds.includes(q.id));
        const q = quizData[currentQuestionIdx];

        if (!isSubmitted) {
            if (selectedOptionIdx === null) return;

            isSubmitted = true;
            const isCorrect = selectedOptionIdx === q.answer;
            if (isCorrect) score++;

            // Update UI
            const selectedOpt = document.getElementById(`opt-${selectedOptionIdx}`);
            const correctOpt = document.getElementById(`opt-${q.answer}`);

            if (!isCorrect) {
                selectedOpt.style.borderColor = 'var(--accent-red)';
                selectedOpt.querySelector('.status-icon').innerHTML = '<i data-lucide="x-circle" color="var(--accent-red)"></i>';
            }
            correctOpt.style.borderColor = 'var(--accent-green)';
            correctOpt.querySelector('.status-icon').innerHTML = '<i data-lucide="check-circle-2" color="var(--accent-green)"></i>';

            document.getElementById('explanation-text').innerText = q.explanation;
            document.getElementById('quiz-feedback').style.display = 'block';
            document.getElementById('quiz-primary-btn').innerText = currentQuestionIdx + 1 === quizData.length ? 'See Results' : 'Next Question';

            lucide.createIcons();
        } else {
            if (currentQuestionIdx + 1 < quizData.length) {
                currentQuestionIdx++;
                renderQuestion();
            } else {
                showResults();
            }
        }
    }

    function showResults() {
        const quizData = QUIZ_DATA.filter(q => currentCourse.quizIds.includes(q.id));
        document.getElementById('quiz-question-container').style.display = 'none';
        const resultsEl = document.getElementById('quiz-results');
        resultsEl.style.display = 'block';

        const percentage = (score / quizData.length) * 100;
        const circumference = 251.2; // 2 * pi * 40
        const offset = circumference - (percentage / 100) * circumference;

        resultsEl.innerHTML = `
            <div style="text-align: center;">
                <h2 style="margin-bottom: 2rem;">Assessment Results</h2>
                
                <div style="position: relative; width: 200px; height: 200px; margin: 0 auto 2rem;">
                    <svg width="200" height="200" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="40" fill="transparent" stroke="var(--accent-red)" stroke-width="8"/>
                        <circle cx="50" cy="50" r="40" fill="transparent" stroke="var(--accent-green)" stroke-width="8"
                                stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"
                                transform="rotate(-90 50 50)" style="transition: stroke-dashoffset 1s ease-out;"/>
                        <text x="50" y="55" text-anchor="middle" fill="white" font-size="14" font-weight="bold">${Math.round(percentage)}%</text>
                    </svg>
                    <div style="margin-top: 1rem; display: flex; justify-content: center; gap: 15px; font-size: 0.85rem;">
                        <span style="display:flex; align-items:center; gap:5px;"><div style="width:10px; height:10px; border-radius:50%; background:var(--accent-green);"></div> Correct</span>
                        <span style="display:flex; align-items:center; gap:5px;"><div style="width:10px; height:10px; border-radius:50%; background:var(--accent-red);"></div> Incorrect</span>
                    </div>
                </div>

                <p style="margin: 1rem 0; font-size: 1.2rem; font-weight: 600;">
                    You scored ${score} out of ${quizData.length}
                </p>
                
                <p style="color: var(--text-muted); margin-bottom: 2rem;">
                    ${score === quizData.length ? "Perfect score! You're a market expert." :
                score > quizData.length / 2 ? "Great job! Keep refining your skills." :
                    "Keep studying! The market is a lifelong teacher."}
                </p>

                <div style="display: flex; gap: 1rem; justify-content: center;">
                    <button class="btn-outline" onclick="startQuiz()" style="display: flex; align-items: center; gap: 8px;">
                        <i data-lucide="rotate-ccw"></i> Retake Quiz
                    </button>
                    <button class="btn-primary" onclick="switchTo('details')">Return to Course</button>
                </div>
            </div>
        `;
        lucide.createIcons();
    }

    function switchTo(view) {
        document.getElementById('view-courses').style.display = view === 'courses' ? 'block' : 'none';
        document.getElementById('view-details').style.display = view === 'details' ? 'block' : 'none';
        document.getElementById('view-quiz').style.display = view === 'quiz' ? 'block' : 'none';
        window.scrollTo(0, 0);
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
        renderCourses();
    });
</script>

<style>
    .icon-box i {
        width: 24px;
        height: 24px;
    }

    .nav-item:hover {
        color: var(--primary) !important;
    }

    .quiz-option:hover {
        background: rgba(255, 255, 255, 0.05) !important;
    }
</style>
